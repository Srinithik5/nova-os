services:
  postgres:
    image: postgres:16-alpine
    container_name: nova-os-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: nova
      POSTGRES_PASSWORD: nova
      POSTGRES_DB: nova_os
    ports:
      - '5432:5432'
    volumes:
      - nova_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U nova -d nova_os']
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  nova_pgdata: